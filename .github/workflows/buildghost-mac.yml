name: Build ghost mac

on:
  push:
    tags:
      - "*-release"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [3.8]
        os: [macOS-15-intel, macOS-15]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Brew Packages
        run: |
          if [ "${{ matrix.os }}" = "macOS-15-intel" ]; then
            brew install zlib
          else
            brew install zlib cairo freetype pixman fontconfig libpng webp
          fi

      - name: Set build environment for Apple Silicon
        if: matrix.os != 'macOS-15-intel'
        run: |
          echo "DYLD_LIBRARY_PATH=${DYLD_LIBRARY_PATH:+$DYLD_LIBRARY_PATH:}$(brew --prefix cairo)/lib" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix zlib)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix zlib)/include" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix zlib)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python3 --version
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt --no-binary=lxml

      - name: Checkout Beamify
        uses: actions/checkout@v4
        with:
          repository: flux3dp/beamify
          ref: 2.1.0
          token: ${{ secrets.REPO_TOKEN }}
          path: .github/actions/beamify

      - name: Install Beamify
        run: |
          cd .github/actions/beamify/python
          pip install . -v

      - name: Install Fluxsvg
        uses: flux3dp/fluxsvg@2.7.7

      - name: Checkout FluxClient
        uses: actions/checkout@v4
        with:
          repository: flux3dp/fluxclient-dev
          ref: 2.9.12
          token: ${{ secrets.REPO_TOKEN }}
          path: .github/actions/fluxclient

      - name: Install FluxClient
        run: |
          cd .github/actions/fluxclient
          pip install . -v

      - name: Build Flux Api
        run: |
          bash -c "set -e 1; export LC_ALL=\"en_US.UTF-8\"; export LC_CTYPE=\"en_US.UTF-8\"; printenv; python3 ghost.py --test"
          bash -c "set -e 1; export LC_ALL=\"en_US.UTF-8\"; export LC_CTYPE=\"en_US.UTF-8\"; pyinstaller --clean ghost.spec"
          ./dist/flux_api/flux_api --test

      - name: Cleanup artifacts
        run: |
          mkdir artifacts
          mv dist/flux_api artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{matrix.os}}
          path: artifacts
